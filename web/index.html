<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Branch</title>
    <script src="/theme.js"></script>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <main id="auth-view" class="auth-view">
        <section class="auth-card">
          <div class="docs-icon">B</div>
          <h1>Sign in to Branch Docs</h1>
          <p>Use Shoo to authenticate before browsing or editing files on this server.</p>
          <button id="signin-button" class="signin-button" type="button">Sign in with Google</button>
          <small id="auth-detail">Shoo issues a signed token. Branch verifies it server-side.</small>
        </section>
      </main>

      <header id="docs-topbar" class="docs-topbar">
        <div class="docs-topbar-spacer" aria-hidden="true"></div>
        <label class="search-box">
          <span>Search</span>
          <input id="docs-search" type="search" placeholder="Search docs">
        </label>
        <button id="home-new-doc" class="new-file-button" type="button" aria-label="Create new file">
          <span class="new-file-icon" aria-hidden="true"></span>
          <span>New file</span>
        </button>
        <div class="docs-account">
          <span class="docs-root" id="docs-root-path">Loading workspace</span>
          <button id="theme-toggle-docs" class="theme-toggle" type="button" title="Switch theme" aria-label="Switch between light and dark theme">☾</button>
          <button id="signout-button" class="text-button" type="button">Sign out</button>
        </div>
      </header>

      <header id="editor-topbar" class="topbar" hidden>
        <div class="doc-header">
          <button id="back-to-docs" class="brand-lockup" type="button">
            <div class="brand-mark">B</div>
            <div class="title-stack">
              <input id="document-title" class="document-title" value="Open a Markdown file" aria-label="Current file path" readonly>
              <span id="root-path" class="root-path">Loading workspace</span>
            </div>
          </button>
          <div class="doc-status">
            <div id="collab-presence" class="collab-presence" aria-label="Active collaborators"></div>
            <div id="save-state" class="save-state">No file open</div>
            <button id="history-toggle" class="history-toggle" type="button" aria-expanded="false" title="Version history (Cmd+Shift+H)">
              <span class="history-toggle-icon" aria-hidden="true"></span>
              <span>History</span>
            </button>
            <button id="theme-toggle-editor" class="theme-toggle" type="button" title="Switch theme" aria-label="Switch between light and dark theme">☾</button>
          </div>
        </div>

        <nav class="menu-row" aria-label="Application menu">
          <button id="file-menu-toggle" type="button" aria-haspopup="menu" aria-expanded="false">File</button>
          <button type="button">Edit</button>
          <button type="button">View</button>
          <button type="button">Insert</button>
          <button id="format-toggle" type="button">Format</button>
          <button type="button">Tools</button>
          <button type="button">Help</button>
        </nav>

        <div id="file-menu" class="docs-menu" role="menu" hidden>
          <button id="file-new-doc" type="button" role="menuitem"><span class="menu-icon">+</span><span>New document</span><small>Cmd+N</small></button>
          <button id="file-open-docs" type="button" role="menuitem"><span class="menu-icon">OPEN</span><span>Open docs list</span><small>Cmd+O</small></button>
          <button id="file-new-folder" type="button" role="menuitem"><span class="menu-icon">DIR</span><span>New folder</span></button>
          <div class="menu-separator"></div>
          <button id="file-save" type="button" role="menuitem"><span class="menu-icon">SAVE</span><span>Save</span><small>Cmd+S</small></button>
          <button id="file-history" type="button" role="menuitem"><span class="menu-icon">VER</span><span>Version history</span><small>Cmd+Shift+H</small></button>
          <div class="menu-separator"></div>
          <button id="file-rename" type="button" role="menuitem"><span class="menu-icon">REN</span><span>Rename</span></button>
          <button id="file-delete" type="button" role="menuitem"><span class="menu-icon">DEL</span><span>Delete</span></button>
        </div>

        <div id="format-panel" class="toolbar" aria-label="Formatting shortcuts" hidden>
          <div class="toolbar-group select-group">
            <button data-block="p" class="select-like" type="button">Normal text</button>
          </div>
          <div class="toolbar-group">
            <button data-block="h1" type="button">H1</button>
            <button data-block="h2" type="button">H2</button>
            <button data-block="quote" type="button">Quote</button>
          </div>
          <div class="toolbar-group">
            <button data-inline="bold" type="button"><strong>B</strong></button>
            <button data-inline="italic" type="button"><em>I</em></button>
            <button data-inline="code" type="button">Code</button>
          </div>
          <div class="toolbar-group">
            <button data-block="bullet" type="button">Bullet</button>
          </div>
          <span class="format-help">Markdown shortcuts: <code># </code><code>## </code><code>- </code><code>**bold**</code></span>
        </div>
      </header>

      <main id="docs-view" class="docs-view">
        <section class="docs-list-card">
          <div class="docs-list-toolbar">
            <nav id="docs-breadcrumbs" class="docs-breadcrumbs" aria-label="Folder breadcrumb"></nav>
            <div class="docs-list-actions">
              <button id="home-new-folder" class="text-button" type="button">New folder</button>
            </div>
          </div>
          <div class="docs-table-header">
            <span>Name</span>
            <span>Type</span>
            <span>Modified</span>
          </div>
          <div id="docs-list" class="docs-list" aria-label="Documents"></div>
        </section>
      </main>

      <main id="editor-view" class="stage" hidden>
        <article id="page-card" class="page-card" aria-label="Document editor">
          <div id="remote-cursors" class="remote-cursors" aria-hidden="true"></div>
          <div id="editor" class="notion-editor" aria-label="Rendered Markdown editor"></div>
        </article>
      </main>

      <aside id="history-panel" class="history-panel" hidden aria-label="Version history">
        <div class="history-header">
          <strong>Version history</strong>
          <button id="history-close" class="text-button" type="button">Close</button>
        </div>
        <div id="history-graph" class="history-graph" aria-label="Save history tree"></div>
        <div id="history-empty" class="history-empty" hidden></div>
        <div id="history-preview" class="history-preview" hidden>
          <div class="history-preview-bar">
            <div class="history-tabs" role="tablist">
              <button id="history-tab-changes" class="history-tab active" type="button" role="tab">Changes</button>
              <button id="history-tab-document" class="history-tab" type="button" role="tab">Document</button>
            </div>
            <div class="history-preview-actions">
              <button id="history-name" class="text-button" type="button" title="Name this version">Name</button>
              <button id="history-restore" class="history-restore" type="button">Restore</button>
            </div>
          </div>
          <div id="history-preview-body" class="history-preview-body"></div>
        </div>
      </aside>
    </div>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="https://shoo.dev/shoo.js" data-shoo-pii="true"></script>
    <script src="/app.js"></script>
  </body>
</html>
